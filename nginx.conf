events {
    worker_connections 4096; # Configuration pour haute charge WebSockets
}

http {
    upstream backend_api {
        server api:8000;
    }

    server {
        listen 80;
        server_name api.sitp.tn; # Remplace par le VRAI domaine en prod

        # ==========================================
        # 1. Requêtes REST Classiques
        # ==========================================
        location /api/ {
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ==========================================
        # 2. Requêtes WebSockets (Tracking GPS)
        # ==========================================
        location /ws/ {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Temps de timeout augmenté pour garder le socket GPS ouvert
            proxy_read_timeout 86400; 
            proxy_send_timeout 86400;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
